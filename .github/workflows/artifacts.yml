name: Artifacts

on:
  push:
    tags:
      - "v*"   # runs only on version tags like v1.2.3

permissions:
  contents: write

jobs:
  upload-assets:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare tar files
        run: |
          tar -czf bachelor.tar.gz -C hoverpower/repo/bachelor .
          tar -czf book.tar.gz -C hoverpower/repo/book .
          tar -czf diss.tar.gz -C hoverpower/repo/diss .
          tar -czf docu.tar.gz -C hoverpower/repo/docu .
          tar -czf habil.tar.gz -C hoverpower/repo/habil .
          tar -czf home.tar.gz -C hoverpower/repo/home .
          tar -czf master.tar.gz -C hoverpower/repo/master .
          tar -czf order.tar.gz -C hoverpower/repo/order .
          tar -czf paper.tar.gz -C hoverpower/repo/paper .
          tar -czf tech.tar.gz -C hoverpower/repo/tech .

      - name: Upload assets to existing release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            bachelor.tar.gz
            book.tar.gz
            diss.tar.gz
            docu.tar.gz
            habil.tar.gz
            home.tar.gz
            master.tar.gz
            order.tar.gz
            paper.tar.gz
            tech.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

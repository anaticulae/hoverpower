name: Release

on:
  push:
    branches:
      - main
env:
  GH_TOKEN: ${{ secrets.REPO }}
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO }}

      - name: Set up GitHub Token
        run: |
          git config --global user.name "Helmut Konrad Schewe"
          git config --global user.email "helmutus@outlook.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/anaticulae/hoverpower.git

      - name: Release and Push
        run: |
          make docker-release

      - name: Push commit and tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git push origin main
          git push origin --tags

      - name: Archive files
        run: |
          zip -r bachelor.zip hoverpower/repo/bachelor/
          zip -r master.zip hoverpower/repo/master/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bachelor.zip
            master.zip
